<!doctype html>
<html><head><meta charset="utf-8"><style>body{margin:0;background:#222}</style></head>
<body>
<div id="frames"></div>
<pre id="report" style="position:fixed;left:-9999px"></pre>
<script>
// Each iframe gets its own viewport, so the CSS media queries evaluate at the
// iframe's width — which --window-size refused to give us.
const CASES = [
  {w:320, h:844, lang:'long', label:'320px / verbose labels (worst case)'},
  {w:360, h:800, lang:'hi',   label:'360px / Hindi'},
  {w:390, h:844, lang:'',     label:'390px / English'},
  {w:1440,h:900, lang:'',     label:'1440px / English (laptop)'},
];
const out = [];
let done = 0;
CASES.forEach((c, i) => {
  const f = document.createElement('iframe');
  f.style.cssText = `width:${c.w}px;height:${c.h}px;border:0;display:block;margin:0 0 20px 0`;
  f.src = `/harness-tmp.html?lang=${c.lang}&n=${i}`;
  document.getElementById('frames').appendChild(f);
  f.addEventListener('load', () => {
    setTimeout(() => {
      const d = f.contentDocument;
      const m = d.getElementById('measurements');
      out[i] = `\n===== ${c.label} =====\n` + (m ? m.textContent : 'NO MEASUREMENTS');
      if (++done === CASES.length) {
        document.getElementById('report').textContent = out.join('\n');
        document.title = 'READY';
      }
    }, 600);
  });
});
</script>
</body></html>
